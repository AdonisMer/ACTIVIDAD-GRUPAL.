<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller</title>
</head>
<body>
    <section id = "contacto">
        <form action="#" method="post" arial-label="Formulario de contacto">
            <fieldset>
                <legend>Datos personales</legend> 
                <p>
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" 
                        required minlength="3" maxlength="60"
                        placeholder="Ej: Juan Pérez">        
                </p>
                <p>
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" 
                        required placeholder="Ej:correo@ejemplo.com">
                </p>
                <p>
                    <label for="telefono">Telefono:</label>
                    <input type="tel" id="telefono" name="telefono"
                        pattern="[0-9]{10}" 
                        title="Ingresa 10 digitos sin espacios"
                        placeholder="Ej: 09999999999">
                </p>
            </fieldset>
                <fieldset>
                    <legend>Tu Mensaje</legend>
                    <p>
                        <label for="asunto">Asunto:</label>
                        <select id="asunto" name="asunto" required>
                            <option value="">-- Selecciona una opcion --</option>
                            <option value="colaboracion">Propuesta de colaboracion</option>
                            <option value="trabajo">Oferta de trabajo</option>
                            <option value="consulta">Consulta general</option>
                            <option value="otro">Otro</option>
                        </select>
                    </p>
                    
                    <p>
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" 
                            rows="5" cols="40"
                            required minlength="30"
                            placeholder="Cuentanos en que podemos ayudarte..." ></textarea>
                    </p>
                </fieldset>
                <!--Opcion A: Checkbox de aceptacion-->
                <p>
                    <input type="checkbox" id="acepto" name="acepto" required>
                    <label for="acepto">Acepto que se almacenen mis datos </label>
                </p>
                <p>
                    <button type="submit">Enviar mensaje</button>
                    <button type="reset">Limpiar</button>
                </p>
            </form>
        </section>
</body>
</html>
